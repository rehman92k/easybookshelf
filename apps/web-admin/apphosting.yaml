# Firebase App Hosting — Admin (monorepo)
# Console: set backend rootDirectory = apps/web-admin

# Do NOT set buildCommand — see apps/web-reader/apphosting.yaml

env:
  - variable: APPHOSTING_BACKEND
    value: admin
    availability:
      - BUILD

runConfig:
  minInstances: 0
  maxInstances: 5
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  runCommand: node apps/web-admin/.next/standalone/apps/web-admin/server.js
