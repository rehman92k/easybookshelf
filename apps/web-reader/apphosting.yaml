# Firebase App Hosting — Reader (monorepo)
# Console: set backend rootDirectory = apps/web-reader
# Build/run commands execute from repository root.
# Docs: https://firebase.google.com/docs/app-hosting/monorepos

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile && pnpm --filter @easybookshelf/web-reader... build
  runCommand: node apps/web-reader/.next/standalone/apps/web-reader/server.js
