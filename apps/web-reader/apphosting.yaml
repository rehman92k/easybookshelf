# Firebase App Hosting — Reader (monorepo)
# Console: set backend rootDirectory = apps/web-reader
# Build/run commands execute from repository root.
# Docs: https://firebase.google.com/docs/app-hosting/monorepos

# Do NOT set buildCommand here — it breaks pnpm monorepos (buildpack strips package.json).
# Build is defined as apphosting:build in root package.json instead.
# Set env APPHOSTING_BACKEND=reader|publisher|admin per backend in Firebase Console.

env:
  - variable: APPHOSTING_BACKEND
    value: reader
    availability:
      - BUILD

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  runCommand: node apps/web-reader/.next/standalone/apps/web-reader/server.js
