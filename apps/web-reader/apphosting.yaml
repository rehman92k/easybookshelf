# Firebase App Hosting — Reader (monorepo)
# Console: set backend rootDirectory = apps/web-reader
# Build/run commands execute from repository root.
# Docs: https://firebase.google.com/docs/app-hosting/monorepos

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  # Use root package.json script — unquoted @ in YAML breaks buildCommand parsing
  buildCommand: "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile && pnpm run apphosting:build:reader"
  runCommand: node apps/web-reader/.next/standalone/apps/web-reader/server.js
