# Firebase App Hosting — Publisher (monorepo)
# Console: set backend rootDirectory = apps/web-publisher

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  buildCommand: "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile && pnpm run apphosting:build:publisher"
  runCommand: node apps/web-publisher/.next/standalone/apps/web-publisher/server.js
