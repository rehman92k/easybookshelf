# Firebase App Hosting — Publisher (monorepo)
# Console: set backend rootDirectory = apps/web-publisher

# Do NOT set buildCommand — see apps/web-reader/apphosting.yaml

env:
  - variable: APPHOSTING_BACKEND
    value: publisher
    availability:
      - BUILD

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

scripts:
  runCommand: node apps/web-publisher/.next/standalone/apps/web-publisher/server.js
